<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Moje Linky PRO</title>
<style>
:root{
  --bg:#0f0f0f;--card:#1c1c1e;--card2:#242426;--input:#2c2c2e;--text:#fff;--muted:#b8b8bd;
  --blue:#0a84ff;--orange:#ff9f0a;--red:#ff3b30;--green:#30d158;--border:#3a3a3c;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text)}
.app{max-width:780px;margin:0 auto;padding:15px 15px 80px}
h1{font-size:28px;margin:10px 0 4px}h2{font-size:19px;margin:0 0 10px}p{margin:6px 0;color:var(--muted)}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:15px;margin-bottom:12px;box-shadow:0 10px 24px #0005}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
label{display:block;font-weight:700;margin:10px 0 5px;color:#eee}
select,input{width:100%;padding:14px;margin:0;border-radius:12px;border:1px solid var(--border);background:var(--input);color:white;font-size:17px;outline:none}
input::placeholder{color:#8e8e93}button{width:100%;padding:14px;margin-top:10px;border-radius:13px;border:none;font-size:16px;font-weight:800;color:white;cursor:pointer}
.btn-add{background:var(--blue)}.btn-edit{background:var(--orange)}.btn-del{background:var(--red)}.btn-green{background:var(--green);color:#071207}.btn-gray{background:#3a3a3c}.btn-small{padding:10px;font-size:14px;margin-top:6px}
.badge{display:inline-block;background:var(--card2);border:1px solid var(--border);border-radius:999px;padding:7px 10px;margin:4px 4px 0 0;color:#ddd;font-size:14px}.badge strong{color:white}
#vysledek{font-size:25px;line-height:1.35;margin-top:10px;text-align:center;font-weight:900}.normaBox{font-size:20px;text-align:center;padding:10px;border-radius:14px;background:#111;border:1px solid var(--border)}
.ok{color:var(--green)}.bad{color:var(--red)}.warn{color:var(--orange)}.muted{color:var(--muted)}
.listItem{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:12px;margin-top:8px}.listItem h3{margin:0 0 5px;font-size:17px}.listItem p{margin:4px 0}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.actions3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.flash-red{animation:flashRed .45s 4}.flash-green{animation:flashGreen .45s 4}@keyframes flashRed{0%{background:rgba(255,0,0,.35)}50%{background:transparent}100%{background:rgba(255,0,0,.35)}}@keyframes flashGreen{0%{background:rgba(0,255,0,.25)}50%{background:transparent}100%{background:rgba(0,255,0,.25)}}
@media(max-width:620px){.row,.row3,.actions,.actions3{grid-template-columns:1fr}h1{font-size:25px}}
</style>
</head>
<body>
<div class="app" id="app">
<h1>Moje Linky PRO</h1>
<p>Evidence týmů, linek/projektů, variant, norem a výpočtu prostojů.</p>

<div class="card">
  <h2>Výpočet prostoje</h2>
  <label>Tým</label><select id="team"></select>
  <label>Linka / projekt</label><select id="linka"></select>
  <label>Varianta</label><select id="varianta"></select>
  <div class="normaBox" id="normaBox">Norma: —</div>
  <label>Vyrobeno</label><input id="vyrobeno" type="number" min="0" placeholder="Zadej počet vyrobených kusů">
</div>

<div class="card">
  <h2>Výsledek</h2>
  <div id="vysledek" class="muted">Vyber tým, linku, variantu a zadej výrobu.</div>
  <div id="detail"></div>
</div>

<div class="card">
  <h2>Správa týmu</h2>
  <div class="actions3">
    <button class="btn-add" onclick="pridatTym()">➕ Přidat tým</button>
    <button class="btn-edit" onclick="upravitTym()">✏️ Upravit tým</button>
    <button class="btn-del" onclick="smazatTym()">🗑️ Smazat tým</button>
  </div>
</div>

<div class="card">
  <h2>Správa linky / projektu</h2>
  <div class="actions3">
    <button class="btn-add" onclick="pridatLinku()">➕ Přidat linku</button>
    <button class="btn-edit" onclick="upravitLinku()">✏️ Upravit linku</button>
    <button class="btn-del" onclick="smazatLinku()">🗑️ Smazat linku</button>
  </div>
</div>

<div class="card">
  <h2>Správa variant</h2>
  <div class="actions3">
    <button class="btn-add" onclick="pridatVariantu()">➕ Přidat variantu</button>
    <button class="btn-edit" onclick="upravitVariantu()">✏️ Upravit variantu/normu</button>
    <button class="btn-del" onclick="smazatVariantu()">🗑️ Smazat variantu</button>
  </div>
</div>

<div class="card">
  <h2>Aktuální databáze</h2>
  <div id="prehledDat"></div>
</div>
</div>

<script>
const DATA_KEY="moje_linky_pro_data_v2";
const STAV_KEY="moje_linky_pro_stav_v2";
const VYROBA_KEY="moje_linky_pro_vyroba_v2";
const LINE_STAV_KEY="moje_linky_pro_stav_linek_v2";

let defaultData={
  "1":{},"2":{},"4":{},"6":{}
};
let data=loadJSON(DATA_KEY,defaultData);
let stav=loadJSON(STAV_KEY,{});
let vyroba=loadJSON(VYROBA_KEY,{});
let stavLinek=loadJSON(LINE_STAV_KEY,{});

const teamSelect=document.getElementById("team");
const linkaSelect=document.getElementById("linka");
const variantaSelect=document.getElementById("varianta");
const input=document.getElementById("vyrobeno");
const vysledek=document.getElementById("vysledek");
const detail=document.getElementById("detail");
const normaBox=document.getElementById("normaBox");
const appDiv=document.getElementById("app");

function loadJSON(key,fallback){try{return JSON.parse(localStorage.getItem(key))||fallback}catch(e){return fallback}}
function saveJSON(key,value){localStorage.setItem(key,JSON.stringify(value))}
function ulozData(){saveJSON(DATA_KEY,data)}
function ulozStav(){saveJSON(STAV_KEY,stav)}
function ulozVyrobu(){saveJSON(VYROBA_KEY,vyroba)}
function ulozStavLinek(){saveJSON(LINE_STAV_KEY,stavLinek)}
function esc(s){return String(s??"").replace(/[&<>'"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[m]))}
function cislo(txt){let n=Number(String(txt).replace(",","."));return Number.isFinite(n)?n:0}
function selectedTeam(){return teamSelect.value}
function selectedLink(){return linkaSelect.value}
function selectedVar(){return variantaSelect.value}
function lineStateKey(team,link){return team+"||"+link}
function prodKey(team,link,varianta){return team+"||"+link+"||"+varianta}
function aktualniLinka(){let t=selectedTeam(),l=selectedLink();return data[t]&&data[t][l]?data[t][l]:null}
function aktualniNorma(){let l=aktualniLinka();if(!l)return 0;let v=selectedVar();return l.varianty&&l.varianty[v]?cislo(l.varianty[v]):0}

teamSelect.onchange=()=>{stav.team=selectedTeam();ulozStav();nactiLinky()};
linkaSelect.onchange=()=>{
  stav.linka=selectedLink();
  ulozStav();
  nactiVarianty(true);
};
variantaSelect.onchange=()=>{
  stav.varianta=selectedVar();
  stavLinek[lineStateKey(selectedTeam(),selectedLink())]=selectedVar();
  ulozStav();ulozStavLinek();
  nactiVyrobu();spocitat();
};
input.oninput=()=>{
  if(selectedTeam()&&selectedLink()&&selectedVar()){
    vyroba[prodKey(selectedTeam(),selectedLink(),selectedVar())]=input.value;
    ulozVyrobu();
  }
  spocitat();
};

function nactiTymy(){
  teamSelect.innerHTML="";
  Object.keys(data).sort((a,b)=>String(a).localeCompare(String(b),'cs',{numeric:true})).forEach(t=>teamSelect.add(new Option("Tým "+t,t)));
  if(stav.team&&data[stav.team])teamSelect.value=stav.team;
  else if(teamSelect.options.length)stav.team=teamSelect.value;
}
function nactiLinky(){
  linkaSelect.innerHTML="";variantaSelect.innerHTML="";
  let t=selectedTeam();let linky=data[t]||{};
  Object.keys(linky).sort((a,b)=>a.localeCompare(b,'cs',{numeric:true})).forEach(l=>linkaSelect.add(new Option(l,l)));
  if(stav.linka&&linky[stav.linka])linkaSelect.value=stav.linka;
  else if(linkaSelect.options.length)stav.linka=linkaSelect.value;
  ulozStav();
  nactiVarianty(false);
}
function nactiVarianty(rememberPerLine){
  variantaSelect.innerHTML="";
  let l=aktualniLinka();
  if(!l){normaBox.textContent="Norma: —";input.value="";spocitat();renderPrehled();return}
  if(!l.varianty)l.varianty={};
  let vars=Object.keys(l.varianty).sort((a,b)=>a.localeCompare(b,'cs',{numeric:true}));
  vars.forEach(v=>variantaSelect.add(new Option(v,v)));
  let savedForLine=stavLinek[lineStateKey(selectedTeam(),selectedLink())];
  if(savedForLine&&l.varianty[savedForLine])variantaSelect.value=savedForLine;
  else if(stav.varianta&&l.varianty[stav.varianta]&&!rememberPerLine)variantaSelect.value=stav.varianta;
  else if(variantaSelect.options.length)variantaSelect.value=variantaSelect.options[0].value;
  stav.varianta=selectedVar();
  if(selectedVar())stavLinek[lineStateKey(selectedTeam(),selectedLink())]=selectedVar();
  ulozStav();ulozStavLinek();
  nactiVyrobu();spocitat();renderPrehled();
}
function nactiVyrobu(){
  let k=prodKey(selectedTeam(),selectedLink(),selectedVar());
  input.value=vyroba[k]??"";
}
function spocitat(){
  let norma=aktualniNorma();
  normaBox.textContent=norma?"Norma: "+norma+" ks / hod":"Norma: —";
  appDiv.classList.remove("flash-red","flash-green");
  if(!selectedTeam()||!selectedLink()||!selectedVar()){
    vysledek.className="muted";vysledek.innerHTML="Nejdřív přidej/vyber tým, linku a variantu.";detail.innerHTML="";return;
  }
  if(!norma){vysledek.className="warn";vysledek.innerHTML="Tato varianta nemá nastavenou normu.";detail.innerHTML="";return}
  let v=cislo(input.value);
  if(!v){vysledek.className="muted";vysledek.innerHTML="Zadej počet vyrobených kusů.";detail.innerHTML="";return}
  let casNaKus=60/norma;
  let odprac=v*casNaKus;
  let prostoj=Math.max(0,Math.round(60-odprac));
  let vykon=(v/norma)*100;
  void appDiv.offsetWidth;
  if(vykon<86){appDiv.classList.add("flash-red");vysledek.className="bad"}else{appDiv.classList.add("flash-green");vysledek.className="ok"}
  vysledek.innerHTML=(odprac>60?"Překročeno":"Prostoj: "+prostoj+" min")+"<br>Výkon: "+vykon.toFixed(1)+" %";
  detail.innerHTML=`<span class="badge"><strong>Tým:</strong> ${esc(selectedTeam())}</span><span class="badge"><strong>Linka:</strong> ${esc(selectedLink())}</span><span class="badge"><strong>Varianta:</strong> ${esc(selectedVar())}</span><span class="badge"><strong>Norma:</strong> ${norma} ks/hod</span><span class="badge"><strong>Vyrobeno:</strong> ${v} ks</span>`;
}

function pridatTym(){
  let n=prompt("Název/číslo nového týmu:"); if(!n)return; n=n.trim(); if(!n)return;
  if(data[n]){alert("Tento tým už existuje.");return}
  data[n]={};stav.team=n;stav.linka="";stav.varianta="";ulozData();ulozStav();nactiTymy();nactiLinky();
}
function upravitTym(){
  let old=selectedTeam(); if(!old)return;
  let n=prompt("Nový název/číslo týmu:",old); if(!n)return; n=n.trim(); if(!n||n===old)return;
  if(data[n]){alert("Tento tým už existuje.");return}
  data[n]=data[old]; delete data[old];
  prejmenujKlice(old,null,null,n,null,null);
  stav.team=n;ulozData();ulozStav();nactiTymy();nactiLinky();
}
function smazatTym(){
  let t=selectedTeam(); if(!t)return;
  if(!confirm("Smazat celý tým "+t+" včetně všech linek a variant?"))return;
  delete data[t];
  Object.keys(vyroba).forEach(k=>{if(k.startsWith(t+"||"))delete vyroba[k]});
  Object.keys(stavLinek).forEach(k=>{if(k.startsWith(t+"||"))delete stavLinek[k]});
  stav={};ulozData();ulozVyrobu();ulozStavLinek();ulozStav();nactiTymy();nactiLinky();
}
function pridatLinku(){
  let t=selectedTeam(); if(!t){alert("Nejdřív vyber nebo přidej tým.");return}
  let n=prompt("Název nové linky / projektu:"); if(!n)return; n=n.trim(); if(!n)return;
  if(data[t][n]){alert("Tato linka už v týmu existuje.");return}
  data[t][n]={varianty:{}};
  let v=prompt("Název první varianty:","Varianta 1");
  if(v){let norma=prompt("Norma pro variantu "+v+" v ks/hod:");data[t][n].varianty[v.trim()]=cislo(norma)}
  stav.linka=n;stav.varianta=v?v.trim():"";ulozData();ulozStav();nactiLinky();
}
function upravitLinku(){
  let t=selectedTeam(),old=selectedLink(); if(!old)return;
  let n=prompt("Nový název linky / projektu:",old); if(!n)return; n=n.trim(); if(!n||n===old)return;
  if(data[t][n]){alert("Tato linka už existuje.");return}
  data[t][n]=data[t][old]; delete data[t][old];
  prejmenujKlice(t,old,null,t,n,null);
  stav.linka=n;ulozData();ulozStav();nactiLinky();
}
function smazatLinku(){
  let t=selectedTeam(),l=selectedLink(); if(!l)return;
  if(!confirm("Smazat linku/projekt "+l+" včetně variant?"))return;
  delete data[t][l];
  Object.keys(vyroba).forEach(k=>{if(k.startsWith(t+"||"+l+"||"))delete vyroba[k]});
  delete stavLinek[lineStateKey(t,l)];
  stav.linka="";stav.varianta="";ulozData();ulozVyrobu();ulozStavLinek();ulozStav();nactiLinky();
}
function pridatVariantu(){
  let l=aktualniLinka(); if(!l){alert("Nejdřív vyber nebo přidej linku.");return}
  let v=prompt("Název nové varianty:"); if(!v)return; v=v.trim(); if(!v)return;
  if(l.varianty[v]){alert("Tato varianta už na této lince existuje.");return}
  let n=prompt("Norma v ks/hod:"); l.varianty[v]=cislo(n);
  stav.varianta=v;stavLinek[lineStateKey(selectedTeam(),selectedLink())]=v;
  ulozData();ulozStav();ulozStavLinek();nactiVarianty(false);
}
function upravitVariantu(){
  let l=aktualniLinka(),old=selectedVar(); if(!l||!old)return;
  let v=prompt("Název varianty:",old); if(!v)return; v=v.trim(); if(!v)return;
  let n=prompt("Norma v ks/hod:",l.varianty[old]); if(n===null)return;
  if(v!==old&&l.varianty[v]){alert("Tato varianta už existuje.");return}
  let oldNorm=l.varianty[old]; delete l.varianty[old]; l.varianty[v]=cislo(n)||oldNorm;
  if(v!==old)prejmenujKlice(selectedTeam(),selectedLink(),old,selectedTeam(),selectedLink(),v);
  stav.varianta=v;stavLinek[lineStateKey(selectedTeam(),selectedLink())]=v;
  ulozData();ulozStav();ulozStavLinek();nactiVarianty(false);
}
function smazatVariantu(){
  let l=aktualniLinka(),v=selectedVar(); if(!l||!v)return;
  if(!confirm("Smazat variantu "+v+"?"))return;
  delete l.varianty[v]; delete vyroba[prodKey(selectedTeam(),selectedLink(),v)];
  stav.varianta="";delete stavLinek[lineStateKey(selectedTeam(),selectedLink())];
  ulozData();ulozVyrobu();ulozStavLinek();ulozStav();nactiVarianty(false);
}
function prejmenujKlice(oldT,oldL,oldV,newT,newL,newV){
  let nv={};
  Object.entries(vyroba).forEach(([k,val])=>{
    let [t,l,v]=k.split("||");
    if((oldT===null||t===oldT)&&(oldL===null||l===oldL)&&(oldV===null||v===oldV)){
      t=newT??t;l=newL??l;v=newV??v;
    }
    nv[prodKey(t,l,v)]=val;
  });
  vyroba=nv;ulozVyrobu();
  let ns={};
  Object.entries(stavLinek).forEach(([k,val])=>{
    let [t,l]=k.split("||");
    if((oldT===null||t===oldT)&&(oldL===null||l===oldL)){
      t=newT??t;l=newL??l;if(oldV!==null&&val===oldV)val=newV;
    }
    ns[lineStateKey(t,l)]=val;
  });
  stavLinek=ns;ulozStavLinek();
}
function renderPrehled(){
  let box=document.getElementById("prehledDat");
  let html="";
  Object.keys(data).sort((a,b)=>a.localeCompare(b,'cs',{numeric:true})).forEach(t=>{
    html+=`<div class="listItem"><h3>Tým ${esc(t)}</h3>`;
    let linky=data[t];
    let names=Object.keys(linky).sort((a,b)=>a.localeCompare(b,'cs',{numeric:true}));
    if(!names.length)html+="<p class='muted'>Zatím bez linek/projektů.</p>";
    names.forEach(l=>{
      html+=`<p><strong>${esc(l)}</strong></p>`;
      Object.entries(linky[l].varianty||{}).forEach(([v,n])=>html+=`<span class="badge">${esc(v)}: <strong>${esc(n)}</strong> ks/hod</span>`);
    });
    html+="</div>";
  });
  box.innerHTML=html||"<p class='muted'>Zatím nejsou žádná data.</p>";
}

nactiTymy();nactiLinky();renderPrehled();
</script>
</body>
</html>
